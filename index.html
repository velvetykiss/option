<style>
:root {
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Roboto Mono', ui-monospace, Menlo, Consolas, monospace;
  --bg: #0a1120;
  --surface-1: #131c30;
  --surface-2: #1a2540;
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #38bdf8;
  --accent-dim: #0c4a6e;
  --border: #22304a;
  --border-strong: #334155;
  --gold: #eab86c;
}

*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{
  font-family:var(--font-sans);
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(56,189,248,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(234,184,108,0.06), transparent 55%),
    var(--bg);
  color:var(--text-primary);
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

.page{max-width:1040px;margin:0 auto;padding:56px 24px 40px}

/* ---------- 헤더 ---------- */
header{margin-bottom:36px}
.eyebrow-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.eyebrow{
  font-family:var(--font-mono);
  font-size:11.5px;
  letter-spacing:0.14em;
  color:var(--accent);
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--accent);display:inline-block}
.site-views{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.site-views b{color:var(--text-secondary);font-weight:600}

h1{
  font-size:clamp(23px,5.5vw,36px);
  font-weight:800;
  letter-spacing:-0.02em;
  line-height:1.3;
  margin-bottom:10px;
  word-break:keep-all;
}
h1 span{color:var(--accent)}

.sub{color:var(--text-secondary);font-size:13.5px;line-height:1.6}

/* ---------- 검색창 ---------- */
.search-wrap{margin-top:28px;position:relative}
.search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
#searchInput{
  width:100%;
  background:var(--surface-1);
  border:1px solid var(--border-strong);
  border-radius:10px;
  padding:14px 16px 14px 44px;
  font-size:14.5px;
  color:var(--text-primary);
  font-family:var(--font-sans);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
#searchInput::placeholder{color:var(--text-muted)}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,0.15)}

/* ---------- 리스트 ---------- */
.list-meta{
  display:flex;align-items:baseline;justify-content:space-between;
  margin:32px 0 14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.list-meta .label{font-size:12.5px;color:var(--text-muted)}
.list-meta .count{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}

/* ---------- 비밀번호 강조 뱃지 ---------- */
.pw-badge {
  background: rgba(234, 184, 108, 0.15); /* 기존 골드 색상 배경을 투명하게 설정 */
  color: var(--gold); /* 글자색은 골드 */
  border: 1px solid var(--gold); /* 테두리 추가 */
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  letter-spacing: 0.05em;
  box-shadow: 0 0 8px rgba(234, 184, 108, 0.3); /* 은은하게 빛나는 효과 */
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  gap:12px;
}

.card{
  background:var(--surface-1);
  border:1px solid var(--border);
  border-left:3px solid var(--border-strong);
  border-radius:10px;
  overflow:hidden;
  transition:border-color .15s, background .15s;
  min-width:0;
}
.card:hover{border-color:var(--accent);border-left-color:var(--accent)}

.card-link{display:block;padding:16px 16px 14px;text-decoration:none;color:inherit}
.card .region{
  font-family:var(--font-mono);
  font-size:12.5px; /* 10.5px에서 12.5px로 크기 확대 */
  font-weight:600;  /* 글씨를 약간 굵게 만들어 가독성 향상 */
  letter-spacing:0.02em; /* 자간을 살짝 줄여서 자연스럽게 조정 */
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:8px;
}
.card .name{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:8px;word-break:keep-all}
.card .meta-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card .types{font-size:11.5px;color:var(--text-secondary)}
.card .arrow{color:var(--text-muted);transition:transform .15s, color .15s;flex-shrink:0}
.card-link:hover .arrow{transform:translateX(3px);color:var(--accent)}

/* ---------- 카드 하단: 의견 남기기 ---------- */
.feedback-toggle{
  width:100%;
  background:var(--surface-2);
  border:none;
  border-top:1px solid var(--border);
  color:var(--text-secondary);
  font-size:11.5px;
  font-family:var(--font-sans);
  padding:9px 16px;
  cursor:pointer;
  text-align:left;
  transition:color .15s, background .15s;
}
.feedback-toggle:hover{color:var(--accent);background:var(--surface-1)}
.feedback-box{display:none;padding:14px 16px 16px;border-top:1px solid var(--border);background:var(--surface-2)}
.feedback-setup-notice{
  font-size:11.5px;
  color:var(--text-muted);
  line-height:1.6;
  background:var(--surface-1);
  border:1px dashed var(--border-strong);
  border-radius:8px;
  padding:12px;
}
.feedback-setup-notice code{
  font-family:var(--font-mono);
  color:var(--accent);
  background:rgba(56,189,248,0.1);
  padding:1px 5px;
  border-radius:4px;
}

.empty{
  display:none;
  text-align:center;
  padding:48px 20px;
  color:var(--text-muted);
  font-size:13.5px;
  border:1px dashed var(--border-strong);
  border-radius:10px;
}
.empty.show{display:block}

/* ---------- 후원(도네이션) 영역 ---------- */
.donate{
  margin-top:56px;
  background:var(--surface-1);
  border:1px solid var(--border);
  border-radius:12px;
  padding:22px;
}
.donate-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
.donate .left{display:flex;align-items:center;gap:14px;min-width:0}
.donate .icon{
  width:40px;height:40px;flex-shrink:0;
  border-radius:50%;
  border:1.5px solid var(--gold);
  color:var(--gold);
  display:flex;align-items:center;justify-content:center;
}
.donate .txt .t1{font-size:13.5px;font-weight:600;margin-bottom:3px}
.donate .txt .t2{font-size:12px;color:var(--text-secondary)}

.reveal-btn{
  background:none;
  border:1px solid var(--border-strong);
  color:var(--text-secondary);
  border-radius:8px;
  font-size:12.5px;
  font-weight:600;
  padding:9px 14px;
  cursor:pointer;
  white-space:nowrap;
  transition:border-color .15s, color .15s;
}
.reveal-btn:hover{border-color:var(--accent);color:var(--accent)}

.account{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  background:var(--surface-2);
  border:1px solid var(--border-strong);
  border-radius:8px;
  padding:12px 14px;
  margin-top:14px;
  flex-wrap:wrap;
}
.account.show{display:flex}
.account .info{font-family:var(--font-mono);font-size:12.5px;color:var(--text-primary);line-height:1.5}
.account .info b{color:var(--gold);font-weight:600}
.copy-btn{
  background:var(--accent-dim);
  color:var(--accent);
  border:none;border-radius:6px;
  font-size:11.5px;font-weight:600;
  padding:7px 11px;
  cursor:pointer;
  white-space:nowrap;
  transition:background .15s;
}
.copy-btn:hover{background:#0e5a8c}
.copy-btn.copied{background:#14532d;color:#4ade80}

footer{margin-top:24px;text-align:center;color:var(--text-muted);font-size:11.5px}

@media screen and (max-width:640px){
  .page{padding:40px 16px 32px}
  .donate-top{align-items:flex-start}
  .account{justify-content:space-between}
}
</style>
</head>
<body>

<div class="page">

  <header>
    <div class="eyebrow-row">
      <div class="eyebrow">Option Estimator Index</div>
      <div class="site-views">전체 방문 <b id="siteViews">-</b>회</div>
    </div>
    <h1>분양 아파트 <span>옵션 견적서</span> 모음</h1>
    <p class="sub">단지명을 검색하고 목록에서 선택하면 해당 아파트의 옵션 견적서 페이지로 이동합니다.</p>

    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="단지명 또는 지역으로 검색 (예: 풍무, 수자인)" oninput="filterList()">
    </div>
  </header>

<div class="list-meta">
    <div style="display:flex; align-items:center; gap:10px;">
      <span class="label">전체 목록</span>
      <span class="pw-badge">PW : 1234</span>
    </div>
    <span class="count" id="countLabel"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState">검색 결과가 없습니다.</div>

  <div class="donate">
    <div class="donate-top">
      <div class="left">
        <div class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
            <line x1="6" y1="1" x2="6" y2="4"></line>
            <line x1="10" y1="1" x2="10" y2="4"></line>
            <line x1="14" y1="1" x2="14" y2="4"></line>
          </svg>
        </div>
        <div class="txt">
          <div class="t1">이 견적서가 도움이 되셨다면</div>
          <div class="t2">커피 한 잔의 후원으로 응원해주세요</div>
        </div>
      </div>
      <button class="reveal-btn" id="revealBtn" onclick="toggleAccount()">후원 계좌 보기</button>
    </div>

    <div class="account" id="accountBox">
      <div class="info"><b>우리은행</b> 022-121207-02-501<br>예금주 박*우</div>
      <button class="copy-btn" onclick="copyAccount(this)">계좌 복사</button>
    </div>
  </div>

  <footer>© 분양 아파트 옵션 견적서 모음 · 개인 참고용 자료입니다</footer>

</div>

<script>
/* ============================================================
   설정
   ------------------------------------------------------------
   ABACUS_NAMESPACE : 조회수 카운터를 구분하는 이름표. 그대로 써도
                       되고, 원하는 문자열로 바꿔도 됩니다(고유하면 OK).
                       단, sujain2.html 등 각 견적서 페이지에도
                       "똑같은 값"을 넣어야 조회수가 서로 연동됩니다.

   CUSDIS_APP_ID    : 카드의 "의견·수정사항 남기기" 댓글창을 쓰려면
                       https://cusdis.com 에서 무료 회원가입 후
                       사이트를 하나 추가해서 발급받은 App ID를
                       여기에 붙여넣으세요. (비워두면 안내 문구만 표시됩니다)
   ============================================================ */
const ABACUS_NAMESPACE = 'pungmu-apt-option-quotes-siwoo';
const CUSDIS_APP_ID = '3c32a0d5-9a0d-4116-b4f6-911127afb207';

/* ============================================================
   아파트 목록 데이터
   ------------------------------------------------------------
   새 견적서 페이지를 만들었다면 아래 배열에 객체 하나만
   추가하면 인덱스 페이지에 자동으로 카드가 생성됩니다.

   name   : 카드에 표시될 아파트(단지) 이름
   region : 지역/지하철역 등 짧은 태그 (검색 대상에도 포함됨)
   types  : 평형 타입 표시용 텍스트 (예: '84 · 105')
   file   : 실제 견적서 html 파일명 (같은 폴더에 두면 됨)
   key    : 조회수/댓글 구분용 고유 키 (보통 file명에서 .html만 뺀 값)
   ============================================================ */
const APARTMENTS = [
  {
    name: '풍무역세권 수자인 그라센트 2차',
    region: '김포 풍무동',
    types: '84 · 105',
    file: 'pmsujain2.html',
    key: 'pmsujain2'
  },
  {
    name: '호반써밋 풍무Ⅲ',
    region: '김포 사우동',
    types: '59A · 59B · 84A · 84B · 84C · 84D',
    file: 'pmhoban3.html',
    key: 'pmhoban3'
  },
  {
    name: '더샵 검단레이크파크',
    region: '검단 불로동',
    types: '59A · 59B · 84A · 84B · 84C',
    file: 'gdlakepark.html',
    key: 'gdlakepark'
  },
  {
    name: '오산헤리티지자이',
    region: '오산 양산동',
    types: '75 · 84A · 84B · 84C · 84D · 102 · 124 · 166P',
    file: 'ysxi.html',
    key: 'ysxi'
  }
  {
    name: '창원 한신더휴',
    region: '창원 마산회원구',
    types: '75 · 84A · 84B · 84C · 84D · 102 · 124 · 166P',
    file: 'cwthehue.html',
    key: 'cwthehue'
  },
  // ,{ name: '다음 아파트 이름', region: '지역', types: '59 · 84', file: 'apt2.html', key: 'apt2' }
];

function renderGrid(list) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');

  grid.innerHTML = list.map(apt => `
    <div class="card">
      <a class="card-link" href="${apt.file}">
        <!-- 지역과 조회수를 같은 줄(flex)에 양끝 정렬(space-between)로 배치 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <div class="region" style="margin-bottom: 0;">${apt.region}</div>
          <div style="font-size: 11.5px; color: var(--text-secondary);">조회 <span id="vc-${apt.key}">-</span>회</div>
        </div>
        <div class="name">${apt.name}</div>
        <div class="meta-row">
          <span class="types">${apt.types} 타입</span>
          <span class="arrow">→</span>
        </div>
      </a>
      <button class="feedback-toggle" onclick="toggleFeedback(this, '${apt.key}', '${apt.name.replace(/'/g, "\\'")}')">💬 의견·수정사항 남기기</button>
      <div class="feedback-box" id="fb-${apt.key}"></div>
    </div>
  `).join('');

  empty.classList.toggle('show', list.length === 0);
  grid.style.display = list.length === 0 ? 'none' : 'grid';
  document.getElementById('countLabel').textContent = `${list.length}개 단지`;

  list.forEach(apt => fetchViewCount(apt.key));
}

function filterList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = APARTMENTS.filter(apt =>
    apt.name.toLowerCase().includes(q) || apt.region.toLowerCase().includes(q)
  );
  renderGrid(filtered);
}

/* ---------- 조회수 ---------- */
function fmtCount(n) {
  return typeof n === 'number' ? n.toLocaleString('ko-KR') : '-';
}

// 로컬 스토리지에 저장될 키 이름 (충돌 방지를 위해 네임스페이스 활용)
const storageKey = `${ABACUS_NAMESPACE}_last_visit`;
// 오늘 날짜 구하기 (예: "2026-07-16")
const todayDate = new Date().toISOString().slice(0, 10);
const lastVisitDate = localStorage.getItem(storageKey);

if (lastVisitDate === todayDate) {
  // 1) 오늘 이미 방문한 기록이 있다면 조회수를 올리지 않고 '조회(get)'만 합니다.
  fetch(`https://abacus.jasoncameron.dev/get/${ABACUS_NAMESPACE}/index`)
    .then(r => r.json())
    .then(d => { document.getElementById('siteViews').textContent = fmtCount(d.value); })
    .catch(() => { document.getElementById('siteViews').textContent = '-'; });
} else {
  // 2) 오늘 첫 방문이거나 방문 기록이 없다면 조회수를 '증가(hit)' 시키고 오늘 날짜를 저장합니다.
  fetch(`https://abacus.jasoncameron.dev/hit/${ABACUS_NAMESPACE}/index`)
    .then(r => r.json())
    .then(d => { 
      document.getElementById('siteViews').textContent = fmtCount(d.value);
      localStorage.setItem(storageKey, todayDate); // 브라우저에 방문 날짜 저장
    })
    .catch(() => { document.getElementById('siteViews').textContent = '-'; });
}

// 카드별 조회수는 증가시키지 않고 현재 값만 조회 (실제 증가는 각 견적서 페이지에서)
function fetchViewCount(key) {
  fetch(`https://abacus.jasoncameron.dev/get/${ABACUS_NAMESPACE}/${key}`)
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById(`vc-${key}`);
      if (el) el.textContent = fmtCount(d.value);
    })
    .catch(() => {
      const el = document.getElementById(`vc-${key}`);
      if (el) el.textContent = '0';
    });
}

/* ---------- 카드별 의견/수정사항 댓글창 (Cusdis) ---------- */
let cusdisScriptEl = null;

function toggleFeedback(btn, key, aptName) {
  const box = document.getElementById(`fb-${key}`);
  const isOpen = box.style.display === 'block';

  document.querySelectorAll('.feedback-box').forEach(b => { b.style.display = 'none'; });
  document.querySelectorAll('.feedback-toggle').forEach(b => { b.textContent = '💬 의견·수정사항 남기기'; });

  if (isOpen) return;

  box.style.display = 'block';
  btn.textContent = '숨기기 ▲';
  loadCusdisThread(box, key, aptName + ' 옵션 견적서');
}

function loadCusdisThread(container, pageId, pageTitle) {
  if (!CUSDIS_APP_ID) {
    container.innerHTML = `<div class="feedback-setup-notice">아직 댓글 기능이 연결되지 않았어요.<br>cusdis.com에서 무료로 App ID를 발급받아 코드 상단의 <code>CUSDIS_APP_ID</code>에 입력해주세요.</div>`;
    return;
  }

  const pageUrl = location.href.split('#')[0].split('?')[0] + '?apt=' + pageId;
  container.innerHTML = `<div id="cusdis_thread"
      data-host="https://cusdis.com"
      data-app-id="${CUSDIS_APP_ID}"
      data-page-id="${pageId}"
      data-page-url="${pageUrl}"
      data-page-title="${pageTitle}"
    ></div>`;

  if (cusdisScriptEl) cusdisScriptEl.remove();
  cusdisScriptEl = document.createElement('script');
  cusdisScriptEl.src = 'https://cusdis.com/js/cusdis.es.js';
  cusdisScriptEl.async = true;
  cusdisScriptEl.defer = true;
  document.body.appendChild(cusdisScriptEl);
}

/* ---------- 후원 계좌 ---------- */
function toggleAccount() {
  const box = document.getElementById('accountBox');
  const btn = document.getElementById('revealBtn');
  const willShow = !box.classList.contains('show');
  box.classList.toggle('show', willShow);
  btn.textContent = willShow ? '후원 계좌 숨기기' : '후원 계좌 보기';
}

function copyAccount(btn) {
  const text = '우리은행 022-121207-02-501 박*우';
  const done = () => {
    const original = btn.textContent;
    btn.textContent = '복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  cb();
}

renderGrid(APARTMENTS);

/* ---------- 불법 복사 및 소스 보기 방지 ---------- */

// 1. 마우스 우클릭 방지
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
});

// 2. 마우스 드래그 및 이미지 복사 방지
document.addEventListener('dragstart', function(e) {
  e.preventDefault();
});

// 3. 주요 단축키 차단 (F12, Ctrl+U, Ctrl+Shift+I 등)
document.addEventListener('keydown', function(e) {
  // F12 (개발자 도구)
  if (e.keyCode === 123) {
    e.preventDefault();
  }
  // Ctrl + U (페이지 소스 보기)
  if (e.ctrlKey && e.keyCode === 85) {
    e.preventDefault();
  }
  // Ctrl + Shift + I / J / C (개발자 도구 단축키들)
  if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
    e.preventDefault();
  }
  // Ctrl + S (페이지 다른 이름으로 저장)
  if (e.ctrlKey && e.keyCode === 83) {
    e.preventDefault();
  }
});
